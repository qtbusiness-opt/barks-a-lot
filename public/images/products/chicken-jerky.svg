<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F5F0E8" rx="8"/>
  <!-- Chicken drumstick -->
  <g transform="translate(200,190) rotate(-30)">
    <!-- Meat part -->
    <ellipse cx="0" cy="-25" rx="40" ry="50" fill="#C8722A"/>
    <!-- Highlight -->
    <ellipse cx="-10" cy="-35" rx="15" ry="20" fill="#D4923A" opacity="0.5"/>
    <!-- Bone stick -->
    <rect x="-8" y="20" width="16" height="55" rx="6" fill="#F5F0E8" stroke="#4A7C8A" stroke-width="2"/>
    <!-- Bone end knob -->
    <circle cx="0" cy="78" r="12" fill="#F5F0E8" stroke="#4A7C8A" stroke-width="2"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#4A7C8A" font-weight="bold">Chicken Jerky</text>
</svg>
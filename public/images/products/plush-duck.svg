<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F5F0E8" rx="8"/>
  <!-- Plush duck -->
  <g transform="translate(200,185)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="55" ry="42" fill="#C8722A"/>
    <!-- Body highlight -->
    <ellipse cx="-10" cy="12" rx="30" ry="22" fill="#D4923A" opacity="0.4"/>
    <!-- Wing -->
    <ellipse cx="25" cy="15" rx="22" ry="30" fill="#B8621A" opacity="0.5" transform="rotate(-15,25,15)"/>
    <!-- Head -->
    <circle cx="-20" cy="-30" r="30" fill="#C8722A"/>
    <!-- Head highlight -->
    <circle cx="-25" cy="-35" r="14" fill="#D4923A" opacity="0.4"/>
    <!-- Eye -->
    <circle cx="-30" cy="-35" r="5" fill="#2A2A2A"/>
    <circle cx="-28" cy="-37" r="2" fill="#FFF" opacity="0.7"/>
    <!-- Beak -->
    <ellipse cx="-50" cy="-25" rx="16" ry="7" fill="#4A7C8A"/>
    <!-- Feet -->
    <ellipse cx="-15" cy="62" rx="14" ry="6" fill="#4A7C8A"/>
    <ellipse cx="15" cy="62" rx="14" ry="6" fill="#4A7C8A"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#4A7C8A" font-weight="bold">Plush Duck</text>
</svg>
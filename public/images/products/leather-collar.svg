<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F5F0E8" rx="8"/>
  <!-- Leather collar -->
  <g transform="translate(200,190)">
    <!-- Collar ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#C8722A" stroke-width="18"/>
    <!-- Leather texture line -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#B8621A" stroke-width="2" stroke-dasharray="4,8" opacity="0.4"/>
    <!-- Buckle -->
    <rect x="50" y="-14" width="22" height="28" rx="3" fill="#4A7C8A" stroke="#3A6C7A" stroke-width="2"/>
    <rect x="56" y="-8" width="10" height="16" rx="2" fill="#F5F0E8"/>
    <!-- Buckle pin -->
    <line x1="61" y1="-14" x2="61" y2="14" stroke="#3A6C7A" stroke-width="2"/>
    <!-- D-ring for tag -->
    <circle cx="-5" cy="-60" r="10" fill="none" stroke="#4A7C8A" stroke-width="3"/>
    <!-- Tag -->
    <circle cx="-5" cy="-75" r="10" fill="#4A7C8A"/>
    <circle cx="-5" cy="-75" r="3" fill="#F5F0E8" opacity="0.6"/>
    <!-- Stitch detail -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#D4923A" stroke-width="1" stroke-dasharray="3,6" opacity="0.6"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#4A7C8A" font-weight="bold">Leather Collar</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F5F0E8" rx="8"/>
  <!-- Rope toy -->
  <g transform="translate(200,190)">
    <!-- Main rope body -->
    <path d="M-60,-30 Q-30,-50 0,-20 Q30,10 60,-10" fill="none" stroke="#4A7C8A" stroke-width="18" stroke-linecap="round"/>
    <!-- Rope twist pattern -->
    <path d="M-60,-30 Q-30,-50 0,-20 Q30,10 60,-10" fill="none" stroke="#5A8C9A" stroke-width="10" stroke-linecap="round" stroke-dasharray="5,12"/>
    <!-- Knot left -->
    <circle cx="-65" cy="-25" r="22" fill="#C8722A"/>
    <circle cx="-65" cy="-25" r="14" fill="#D4923A" opacity="0.6"/>
    <!-- Knot right -->
    <circle cx="65" cy="-5" r="22" fill="#C8722A"/>
    <circle cx="65" cy="-5" r="14" fill="#D4923A" opacity="0.6"/>
    <!-- Center knot -->
    <circle cx="0" cy="-20" r="18" fill="#C8722A"/>
    <circle cx="0" cy="-20" r="11" fill="#D4923A" opacity="0.6"/>
    <!-- Frayed ends -->
    <line x1="-82" y1="-35" x2="-90" y2="-45" stroke="#4A7C8A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-80" y1="-20" x2="-92" y2="-15" stroke="#4A7C8A" stroke-width="3" stroke-linecap="round"/>
    <line x1="82" y1="-15" x2="92" y2="-25" stroke="#4A7C8A" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="5" x2="90" y2="12" stroke="#4A7C8A" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#4A7C8A" font-weight="bold">Rope Toy</text>
</svg>